<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05060a"/>
      <stop offset="0.5" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0e0a1a"/>
    </linearGradient>
    <radialGradient id="orbBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#e879f9"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-400 0" to="400 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#e879f9" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softblur"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <style>
    .orbB{animation:floatA 16s ease-in-out infinite}
    .orbP{animation:floatB 20s ease-in-out infinite}
    .orbC{animation:floatA 13s ease-in-out infinite reverse}
    .scan{animation:scan 7s linear infinite}
    .title{font-family:'Segoe UI',Helvetica,Arial,sans-serif;font-weight:800;font-size:70px;letter-spacing:6px}
    .glowpulse{animation:gp 3.5s ease-in-out infinite}
    .acc{stroke-dasharray:700;stroke-dashoffset:700;animation:draw 2.4s 0.3s ease-out forwards}
    .role{font-family:'Fira Code','Consolas','Courier New',monospace;font-weight:600;font-size:23px;fill:#94a3b8;opacity:0}
    .r1{animation:rolecycle 17.5s 0s infinite}
    .r2{animation:rolecycle 17.5s 3.5s infinite}
    .r3{animation:rolecycle 17.5s 7s infinite}
    .r4{animation:rolecycle 17.5s 10.5s infinite}
    .r5{animation:rolecycle 17.5s 14s infinite}
    .pt{fill:#7dd3fc;animation:rise linear infinite}
    .br{stroke:#22d3ee;stroke-width:2;fill:none;animation:gp 3.5s ease-in-out infinite}
    @keyframes floatA{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,24px)}}
    @keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(-70px,-18px)}}
    @keyframes gp{0%,100%{opacity:.55}50%{opacity:1}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes rolecycle{0%{opacity:0}2%{opacity:1}18%{opacity:1}20%{opacity:0}100%{opacity:0}}
    @keyframes rise{0%{transform:translateY(0);opacity:0}10%{opacity:.9}90%{opacity:.9}100%{transform:translateY(-240px);opacity:0}}
    @keyframes scan{0%{transform:translateX(-1300px)}100%{transform:translateX(1300px)}}
  </style>

  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <!-- drifting glow orbs -->
  <circle class="orbB" cx="280" cy="150" r="230" fill="url(#orbBlue)"/>
  <circle class="orbP" cx="950" cy="150" r="210" fill="url(#orbPurple)"/>
  <circle class="orbC" cx="600" cy="220" r="180" fill="url(#orbCyan)"/>

  <!-- subtle grid -->
  <g stroke="#5b7fff" stroke-width="1" opacity="0.07">
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/><line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/><line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/><line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1100" y1="0" x2="1100" y2="300"/>
    <line x1="0" y1="75" x2="1200" y2="75"/><line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
  </g>

  <!-- scan sweep -->
  <rect class="scan" x="0" y="0" width="170" height="300" fill="url(#lineGrad)" opacity="0.10"/>

  <!-- rising particles -->
  <g>
    <circle class="pt" cx="120" cy="300" r="2.5" style="animation-duration:11s;animation-delay:0s"/>
    <circle class="pt" cx="260" cy="300" r="2" style="animation-duration:9s;animation-delay:2s"/>
    <circle class="pt" cx="400" cy="300" r="3" style="animation-duration:13s;animation-delay:4s"/>
    <circle class="pt" cx="540" cy="300" r="2" style="animation-duration:10s;animation-delay:1s"/>
    <circle class="pt" cx="700" cy="300" r="2.5" style="animation-duration:12s;animation-delay:3s"/>
    <circle class="pt" cx="840" cy="300" r="2" style="animation-duration:8s;animation-delay:5s"/>
    <circle class="pt" cx="970" cy="300" r="3" style="animation-duration:11s;animation-delay:2.5s"/>
    <circle class="pt" cx="1090" cy="300" r="2" style="animation-duration:14s;animation-delay:1.5s"/>
  </g>

  <!-- HUD corner brackets -->
  <path class="br" d="M40 40 h44 M40 40 v44"/>
  <path class="br" d="M1160 40 h-44 M1160 40 v44"/>
  <path class="br" d="M40 260 h44 M40 260 v-44"/>
  <path class="br" d="M1160 260 h-44 M1160 260 v-44"/>

  <!-- title: blurred glow layer + crisp layer -->
  <text x="600" y="148" text-anchor="middle" class="title glowpulse" fill="url(#textGrad)" filter="url(#softblur)">AMAN SHEKHAR</text>
  <text x="600" y="148" text-anchor="middle" class="title" fill="url(#textGrad)" filter="url(#glow)">AMAN SHEKHAR</text>

  <!-- animated accent line -->
  <line class="acc" x1="430" y1="172" x2="770" y2="172" stroke="url(#lineGrad)" stroke-width="3"/>

  <!-- cycling roles -->
  <g>
    <text x="600" y="212" text-anchor="middle" class="role r1">&lt; MERN Stack Developer /&gt;</text>
    <text x="600" y="212" text-anchor="middle" class="role r2">&lt; Generative AI Engineer /&gt;</text>
    <text x="600" y="212" text-anchor="middle" class="role r3">&lt; SWE Intern @ IBM /&gt;</text>
    <text x="600" y="212" text-anchor="middle" class="role r4">&lt; 400+ LeetCode Solved /&gt;</text>
    <text x="600" y="212" text-anchor="middle" class="role r5">&lt; Full-Stack Problem Solver /&gt;</text>
  </g>
</svg>
